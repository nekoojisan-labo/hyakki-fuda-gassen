<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#090c11">
  <link rel="icon" href="data:,">
  <title>百鬼札合戦</title>
  <link rel="stylesheet" href="src/styles/game.css">
  <link rel="stylesheet" href="src/styles/responsive-fixes.css">
</head>
<body>
  <main id="game" class="game-shell" aria-live="polite">
    <header class="opponent-bar player-bar">
      <div class="portrait cpu">逢</div>
      <div><small>CPU</small><strong>逢魔の陰陽師</strong></div>
      <div class="life"><span>LP</span><b id="cpu-life">4000</b></div>
    </header>

    <section id="battlefield" class="battlefield" aria-label="対戦盤面">
      <img class="battlefield-art" src="assets/backgrounds/shrine-battlefield.svg" alt="月夜の廃神社">
      <div class="battle-shade"></div>
      <div id="slot-layer" class="slot-layer"></div>
      <div id="effect-layer" class="effect-layer" aria-hidden="true"></div>
      <div class="phase-rail" aria-label="現在のフェーズ"><span>DRAW</span><span id="phase-main">MAIN</span><span id="phase-battle">BATTLE</span></div>
      <div class="pile-label cpu-deck-label">山札 <b id="cpu-deck">15</b></div>
      <div class="pile-label cpu-grave-label">墓地 <b id="cpu-grave">0</b></div>
      <div class="pile-label player-deck-label">山札 <b id="player-deck">15</b></div>
      <div class="pile-label player-grave-label">墓地 <b id="player-grave">0</b></div>
      <button id="debug-toggle" class="debug-toggle" type="button" aria-pressed="false">座標</button>
    </section>

    <section class="command-dock">
      <div class="player-bar self-bar">
        <div class="portrait player">符</div>
        <div><small>PLAYER</small><strong>あなた</strong></div>
        <div class="life"><span>LP</span><b id="player-life">4000</b></div>
      </div>
      <div id="message" class="message">カードを選んでください</div>
      <div id="hand" class="hand" aria-label="手札"></div>
      <div class="commands">
        <button id="attack-position" type="button">攻撃表示</button>
        <button id="set-position" type="button">裏側守備</button>
        <button id="activate" type="button">効果発動</button>
        <button id="battle-phase" type="button">バトルへ</button>
        <button id="direct-attack" type="button">直接攻撃</button>
        <button id="end-turn" class="primary" type="button">ターン終了</button>
      </div>
      <details class="battle-log"><summary>対戦ログ</summary><ol id="log"></ol></details>
    </section>
  </main>

  <dialog id="start-dialog" class="start-dialog">
    <div class="title-mark">百鬼札合戦</div>
    <p>妖札を操り、逢魔の陰陽師のLPを0にせよ。</p>
    <button id="resume-game" type="button">続きから</button>
    <button id="new-game" class="primary" type="button">新しい試合</button>
  </dialog>

  <dialog id="result-dialog" class="result-dialog">
    <h2 id="result-title">勝負あり</h2>
    <p id="result-reason"></p>
    <button id="restart-game" class="primary" type="button">もう一度戦う</button>
  </dialog>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
